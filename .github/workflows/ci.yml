name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --locked
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --locked
      - name: mypy
        run: uv run mypy apps config

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poker_schedule_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/poker_schedule_test
      DJANGO_SECRET_KEY: ci-secret
      DJANGO_DEBUG: "True"
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps (gettext for i18n, WeasyPrint's pango/cairo chain for PDF export)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gettext \
            libpango-1.0-0 libpangoft2-1.0-0 \
            libharfbuzz0b libfontconfig1
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --locked
      - name: Check migrations are up to date
        run: uv run python manage.py makemigrations --check --dry-run
      - name: Compile messages
        run: uv run python manage.py compilemessages --ignore=.venv
      - name: Run tests
        run: uv run pytest
